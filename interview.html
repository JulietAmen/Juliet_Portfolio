<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Interview</title>
    <link rel="stylesheet" href="css/interview.css">
</head>
<body>
  <script src="js/contact.js"></script>

    <!-- Header -->
    <header>
          <nav class="portfolio-navbar">
            <div class="logo">
            <h2>
              <a href="index.html" style="color: #b74e4e; text-decoration: none;">Juliet Chukwuemeka</a>
                      </h2>
        </div>
            <ul>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="https://github.com/JulietAmen/Project_Website/blob/main/Juliet%20Chukwuemeka_CV.pdf" target="_blank" rel="noopener noreferrer">Resume</a></li>               
                 <li><a href="interview.html" class="btn">Book Interview</a></li>
            </ul>
        </nav>
    </header>
    
    <section class="contact-page-layout">
  
      <div class="layout-left-column">
        <h1 class="main-headline">Let’s Work<br>Together</h1>
        
        <div class="profile-image-wrapper">
          <img src="images/profile.jpg" alt="Juliet Chukwuemeka" class="profile-img" />
        </div>
      </div>
    
      <div class="layout-right-column">
        <div class="contact-card-panel">
          <form class="contact-form" id="extendedContactForm" action="https://api.web3forms.com/submit" method="POST">
            
            <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
    
            <div class="form-row-grid">
              <div class="field-group">
                <label for="first-name">Name</label>
                <input type="text" id="first-name" name="first-name" required />
                <span class="field-sublabel">First Name (required)</span>
              </div>
              
              <div class="field-group">
                <label class="desktop-spacer">&nbsp;</label>
                <input type="text" id="last-name" name="last-name" required />
                <span class="field-sublabel">Last Name (required)</span>
              </div>
            </div>
    
            <div class="field-group">
              <label for="email-address">Email <span class="label-aside">(required)</span></label>
              <input type="email" id="email-address" name="email-address" required />
            </div>
    
            <div class="checkbox-group">
              <input type="checkbox" id="newsletter" name="newsletter" value="subscribed" />
              <label for="newsletter">Sign up for news and updates</label>
            </div>
    
            <div class="field-group">
              <label for="inquiry-reason">Dropdown <span class="label-aside">(required)</span></label>
              <div class="select-wrapper">
                <select id="inquiry-reason" name="inquiry-reason" required>
                  <option value="" disabled selected hidden>I'm interested in...</option>
                  <option value="freelance">Freelance Web Development</option>
                  <option value="interview">Booking an Interview Slot</option>
                  <option value="collaboration">Open Source Collaboration</option>
                </select>
              </div>
            </div>
    
            <div class="field-group">
              <label for="subject">Subject <span class="label-aside">(required)</span></label>
              <input type="text" id="subject" name="subject" required />
            </div>
    
            <div class="field-group">
              <label for="message">Message <span class="label-aside">(required)</span></label>
              <textarea id="message" name="message" rows="5" required></textarea>
            </div>
    
            <button type="submit" class="contact-submit-btn">Submit</button>
    
          </form>
        </div>
      </div>
    
    </section>
   

  </body>
</html>
